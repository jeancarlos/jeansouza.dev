re o que precisa de ajuste usando de verdade, e a interface ainda precisa funcionar no mundo real e atender às minhas expectativas sobre como os usuários vão navegar nela. Daí vêm as decisões sobre o que pular, manter ou melhorar. Nem tudo que eu planejei vai ser feito: se não encaixa na visão, não agrega tanto, ou adiciona complexidade desnecessária, fica de fora. E outras coisas vão entrando com o tempo. Uma delas é uma lista de projetos, com um \"case\" de cada um que achar interessante comentar, provavelmente junto do blog, em vez de uma página separada de projetos.\n"])</script><script>self.__next_f.push([1,"8:[\"$\",\"$L13\",null,{\"children\":[\"$\",\"$L14\",null,{\"posts\":[{\"slug\":\"2026-06-03-como-modernizei-meu-site\",\"locale\":\"pt\",\"title\":\"Por que eu construí esse site do jeito que construí\",\"date\":\"2026-06-03\",\"description\":\"Esse portfólio não é uma lista de tecnologias. É uma série de decisões deliberadas — e o código aberto pra quem quiser auditar.\",\"content\":\"$15\"}],\"locale\":\"pt\",\"initialOpen\":\"resume\"}]}]\n"])</script><script>self.__next_f.push([1,"16:I[75696,[\"/_next/static/chunks/02wl0n8hx53rf.js\",\"/_next/static/chunks/29lrohnrvwxy-.js\",\"/_next/static/chunks/22mp9as1utt25.js\",\"/_next/static/chunks/3cyyua4c3lc96.js\"],\"default\"]\n17:I[10381,[\"/_next/static/chunks/02wl0n8hx53rf.js\",\"/_next/static/chunks/29lrohnrvwxy-.js\",\"/_next/static/chunks/22mp9as1utt25.js\",\"/_next/static/chunks/3cyyua4c3lc96.js\"],\"LocalePersist\"]\n18:I[9409,[\"/_next/static/chunks/02wl0n8hx53rf.js\",\"/_next/static/chunks/29lrohnrvwxy-.js\",\"/_next/static/chunks/22mp9as1utt25.js\",\"/_next/static/chunks/3cyyua4c3lc96.js\"],\"Topbar\"]\ne:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n7:[\"$\",\"$L16\",null,{\"formats\":\"$undefined\",\"locale\":\"pt\",\"messages\":{\"nav\":{\"blog\":\"Blog\",\"resume\":\"Currículo\"},\"hero\":{\"
